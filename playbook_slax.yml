---
- name: Minimales Schulsystem für Slax (USB-Persistenz)
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Apt-Cache aktualisieren
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Deutsches Tastaturlayout konfigurieren
      copy:
        dest: /etc/default/keyboard
        content: |
          XKBMODEL="pc105"
          XKBLAYOUT="de"
          XKBVARIANT=""
          XKBOPTIONS=""
          BACKSPACE="guess"
      notify: Tastatureinstellungen anwenden

    - name: Bash-Autovervollständigung (apt) sicherstellen
      apt:
        name: bash-completion
        state: present

    - name: Gewünschte Softwarepakete aus Standardquellen installieren
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - git
        - rsync
        - gparted
        - unrar
        - python3-pip
        - default-jdk
        - default-jre
        - openjdk-8-jre
        - openjdk-8-jdk
        - vlc
        - gimp
        - simplescreenrecorder
        - qrencode
        - libreoffice
        - geogebra
        - scratch
      ignore_errors: yes 

    # =========================================================================
    # DEB-PAKETE HERUNTERLADEN & INSTALLIEREN
    # =========================================================================

    - name: Google Chrome herunterladen
      get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome.deb
      ignore_errors: yes

    - name: Google Chrome installieren
      apt:
        deb: /tmp/google-chrome.deb
      ignore_errors: yes

    - name: Greenfoot herunterladen
      get_url:
        url: https://www.greenfoot.org/download/files/Greenfoot-linux-x64-390.deb
        dest: /tmp/greenfoot.deb
      ignore_errors: yes

    - name: Greenfoot installieren
      apt:
        deb: /tmp/greenfoot.deb
      ignore_errors: yes
    
    - name: Filius herunterladen
      get_url:
        url: https://www.lernsoftware-filius.de/downloads/Setup/filius_2.9.4_all.deb
        dest: /tmp/filius.deb
      ignore_errors: yes

    - name: Filius installieren
      apt:
        deb: /tmp/filius.deb
      ignore_errors: yes

    - name: BlueJ herunterladen (Ersatz für Snap)
      get_url:
        url: https://www.bluej.org/download/files/BlueJ-linux-530.deb
        dest: /tmp/bluej.deb
      ignore_errors: yes

    - name: BlueJ installieren
      apt:
        deb: /tmp/bluej.deb
      ignore_errors: yes

    # =========================================================================
    # PORTABLE SOFTWARE IN /OPT (AppImages & Archive)
    # =========================================================================

    - name: Zielverzeichnisse in /opt sicherstellen
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt
    # --- AppImages ---

    - name: Arduino IDE (AppImage) herunterladen
      get_url:
        url: https://downloads.arduino.cc/arduino-ide/arduino-ide_2.3.2_Linux_64bit.AppImage
        dest: /opt/Arduino.AppImage
        mode: '0755'
      ignore_errors: yes

    # --- Archive ---

   - name: Apache NetBeans herunterladen und entpacken
      unarchive:
        src: https://dlcdn.apache.org/netbeans/netbeans-installers/21/netbeans-21-bin.zip
        dest: /opt/
        remote_src: yes
        creates: /opt/netbeans/bin/netbeans
      ignore_errors: yes

    # =========================================================================
    # OPENJDK 8 MANUELL INSTALLIEREN
    # =========================================================================

    - name: Zielverzeichnis für OpenJDK 8 sicherstellen
      file:
        path: /opt/openjdk-8
        state: directory
        mode: '0755'

    - name: OpenJDK 8 (Amazon Corretto) herunterladen und entpacken
      unarchive:
        # Dieser Link lädt immer automatisch die aktuellste, sichere Version von Java 8 herunter
        src: https://corretto.aws/downloads/latest/amazon-corretto-8-x64-linux-jdk.tar.gz
        dest: /opt/openjdk-8/
        remote_src: yes
        extra_opts:
          - --strip-components=1
        creates: /opt/openjdk-8/bin/java
      ignore_errors: yes

    # Damit Befehle wie "java -version" im Terminal funktionieren und Programme
    # wie Greenfoot oder BlueJ die Java-Installation finden, müssen wir sie registrieren:
    
    - name: Java (JRE) dem System als Alternative bekannt machen
      command: update-alternatives --install /usr/bin/java java /opt/openjdk-8/bin/java 100
      ignore_errors: yes

    - name: Javac (JDK Compiler) dem System als Alternative bekannt machen
      command: update-alternatives --install /usr/bin/javac javac /opt/openjdk-8/bin/javac 100
      ignore_errors: yes


    # =========================================================================
    # STARTMENÜ-EINTRÄGE (.desktop Dateien) ERSTELLEN
    # =========================================================================

    - name: Desktop-Eintrag für Arduino IDE anlegen
      copy:
        dest: /usr/share/applications/arduino.desktop
        content: |
          [Desktop Entry]
          Name=Arduino IDE
          Comment=Open-source electronics prototyping platform
          Exec=/opt/Arduino.AppImage
          Terminal=false
          Type=Application
          Categories=Development;IDE;Electronics;

    - name: Desktop-Eintrag für Apache NetBeans anlegen
      copy:
        dest: /usr/share/applications/netbeans.desktop
        content: |
          [Desktop Entry]
          Name=Apache NetBeans
          Comment=The Smarter Way to Code
          Exec=/opt/netbeans/bin/netbeans
          Icon=/opt/netbeans/nb/netbeans.png
          Terminal=false
          Type=Application
          Categories=Development;IDE;Java;

  handlers:
    - name: Tastatureinstellungen anwenden
      command: setupcon
      ignore_errors: yes
